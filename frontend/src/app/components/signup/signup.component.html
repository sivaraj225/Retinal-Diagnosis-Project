<div class="auth-container">
    <mat-card class="auth-card glass-panel">
        <mat-card-header>
            <div class="header-content">
                <div class="logo">
                    <span class="logo-text">Retinal<span class="highlight">AI</span></span>
                </div>
                <mat-card-title>Create Account</mat-card-title>
                <mat-card-subtitle>Join us to start analyzing retinal scans</mat-card-subtitle>
            </div>
        </mat-card-header>
        <mat-card-content>
            <form (submit)="onSignup($event)">
                <div class="custom-form-field full-width">
                    <label>Full Name</label>
                    <div class="custom-input-group">
                        <mat-icon>person</mat-icon>
                        <input class="custom-input" type="text" [(ngModel)]="name" name="name" required placeholder="Full Name">
                    </div>
                </div>

                <div class="custom-form-field full-width">
                    <label>Email Address</label>
                    <div class="custom-input-group">
                        <mat-icon>email</mat-icon>
                        <input class="custom-input" type="email" [(ngModel)]="email" name="email" required placeholder="Email Address">
                    </div>
                </div>

                <div class="custom-form-field full-width">
                    <label>Password</label>
                    <div class="custom-input-group">
                        <mat-icon>lock</mat-icon>
                        <input class="custom-input" type="password" [(ngModel)]="password" name="password" required placeholder="Password">
                    </div>
                </div>

                <div class="actions">
                    <button mat-flat-button color="primary" class="full-width-btn" type="submit"
                        [disabled]="!email || !password || !name">
                        Sign Up
                    </button>
                </div>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a routerLink="/login">Sign In</a></p>
            </div>
        </mat-card-content>
    </mat-card>
</div>
