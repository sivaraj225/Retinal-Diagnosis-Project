@if (isLoggedIn$ | async) {
<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #drawer class="sidenav" fixedInViewport [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
    [mode]="(isHandset$ | async) ? 'over' : 'side'" [opened]="(isHandset$ | async) !== true" class="app-sidenav">
    <mat-toolbar class="sidenav-header">
      <span class="logo-text">Retinal<span class="highlight">AI</span></span>
    </mat-toolbar>
    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link">
        <mat-icon matListItemIcon>dashboard</mat-icon> <span matListItemTitle>Dashboard</span>
      </a>
      <a mat-list-item routerLink="/upload" routerLinkActive="active-link">
        <mat-icon matListItemIcon>cloud_upload</mat-icon> <span matListItemTitle>Upload Images</span>
      </a>
      <a mat-list-item routerLink="/history" routerLinkActive="active-link">
        <mat-icon matListItemIcon>history</mat-icon> <span matListItemTitle>Patient History</span>
      </a>
      <a mat-list-item routerLink="/results" routerLinkActive="active-link">
        <mat-icon matListItemIcon>assessment</mat-icon> <span matListItemTitle>Result</span>
      </a>
      <a mat-list-item routerLink="/settings" routerLinkActive="active-link">
        <mat-icon matListItemIcon>settings</mat-icon> <span matListItemTitle>Settings</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content>
    <mat-toolbar color="primary" class="app-toolbar">
      @if (isHandset$ | async) {
      <button type="button" aria-label="Toggle sidenav" mat-icon-button (click)="drawer.toggle()">
        <mat-icon>menu</mat-icon>
      </button>
      }
      <span class="page-title">Retinal Diagnostic System</span>
      <span class="spacer"></span>
      <button mat-icon-button (click)="toggleThemeState()">
        <mat-icon>{{ isDark ? 'brightness_3' : 'wb_sunny' }}</mat-icon>
      </button>

      <button mat-icon-button [matMenuTriggerFor]="profileMenu">
        <mat-icon>account_circle</mat-icon>
      </button>
      <mat-menu #profileMenu="matMenu">
        <button mat-menu-item routerLink="/settings">
          <mat-icon>person</mat-icon>
          <span>My Profile</span>
        </button>
        <button mat-menu-item (click)="logout()">
          <mat-icon>logout</mat-icon>
          <span>Sign Out</span>
        </button>
      </mat-menu>
    </mat-toolbar>
    <div class="main-content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
} @else {
<router-outlet></router-outlet>
}
